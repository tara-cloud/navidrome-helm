name: Deploy Navidrome

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          sudo chown $(id -u):$(id -g) ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Adopt existing resources for Helm
        run: |
          kubectl create namespace navidrome --dry-run=client -o yaml | kubectl apply -f -
          for resource in deployment service pvc configmap secret; do
            kubectl get $resource -n navidrome -o name 2>/dev/null | while read name; do
              kubectl label $name -n navidrome app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true
              kubectl annotate $name -n navidrome \
                meta.helm.sh/release-name=navidrome \
                meta.helm.sh/release-namespace=navidrome \
                --overwrite 2>/dev/null || true
            done
          done

      - name: Helm upgrade
        run: |
          helm upgrade --install navidrome ./helm/navidrome \
            --namespace navidrome \
            --create-namespace \
            --set oidc.clientId="${{ secrets.NAVIDROME_OIDC_CLIENT_ID }}" \
            --set oidc.clientSecret="${{ secrets.NAVIDROME_OIDC_CLIENT_SECRET }}" \
            --wait \
            --timeout 3m

      - name: Check pod status
        if: always()
        run: |
          kubectl get pods -n navidrome
          kubectl logs -n navidrome -l app=navidrome --tail=30 || true
