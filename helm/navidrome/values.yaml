replicaCount: 1

image:
  repository: deluan/navidrome
  tag: latest
  pullPolicy: Always

nodeSelector:
  tara/node-role: pi

config:
  musicFolder: /music
  dataFolder: /data

storage:
  data:
    storageClass: nfs-hdd
    size: 5Gi
  music:
    hostPath: /HDD/Media/Music

oidc:
  enabled: true
  discoveryUrl: https://auth.tara-cloud.org/application/o/navidrome/.well-known/openid-configuration
  redirectUrl: https://navidrome.tara-cloud.org/auth/oidc/callback
  skipUserInfo: false
  # clientId and clientSecret injected via --set or GitHub Secrets at deploy time
  clientId: ""
  clientSecret: ""

ingress:
  enabled: false
  host: navidrome.tara-cloud.org
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
